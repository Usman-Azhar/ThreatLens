<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThreatLens — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#040d14;--bg2:#071520;--panel:#0a1e2e;--border:#0e3a52;
    --accent:#00c8ff;--accent2:#00ff9d;--danger:#ff3b5c;--warn:#ffb800;
    --text:#c8dde8;--text-dim:#4a7a94;--glow:0 0 18px rgba(0,200,255,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(4,13,20,0.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2rem;height:60px;
  }
  .nav-logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo span{color:var(--accent2);}
  .logo-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,157,0.4);}50%{box-shadow:0 0 0 6px rgba(0,255,157,0);}}
  .nav-links{display:flex;gap:0.5rem;}
  .nav-links a{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:var(--text-dim);padding:6px 14px;border:1px solid transparent;border-radius:3px;transition:all 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--border);background:rgba(0,200,255,0.06);}
  .nav-right{display:flex;align-items:center;gap:1rem;}
  .nav-org{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--accent2);background:rgba(0,255,157,0.08);padding:4px 12px;border:1px solid rgba(0,255,157,0.2);border-radius:3px;}
  .nav-logout{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--danger);cursor:pointer;border:1px solid rgba(255,59,92,0.3);padding:4px 10px;border-radius:3px;background:none;transition:all 0.2s;}
  .nav-logout:hover{background:rgba(255,59,92,0.1);}

  /* PAGE */
  .page{position:relative;z-index:1;padding:80px 2rem 2rem;}
  .page-header{margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
  .page-header h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.8rem;color:#fff;letter-spacing:2px;}
  .page-header p{color:var(--text-dim);font-size:0.9rem;margin-top:4px;font-family:'Share Tech Mono',monospace;}

  /* KPI CARDS */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1.2rem 1.5rem;position:relative;overflow:hidden;}
  .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
  .kpi.danger::after{background:var(--danger);}
  .kpi.warn::after{background:var(--warn);}
  .kpi.green::after{background:var(--accent2);}
  .kpi-val{font-family:'Share Tech Mono',monospace;font-size:2rem;color:var(--accent);display:block;}
  .kpi.danger .kpi-val{color:var(--danger);}
  .kpi.warn .kpi-val{color:var(--warn);}
  .kpi.green .kpi-val{color:var(--accent2);}
  .kpi-label{font-family:'Rajdhani',sans-serif;font-size:0.8rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-top:4px;}

  /* CHARTS */
  .charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:2rem;}
  .chart-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1.5rem;}
  .chart-card h3{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.9rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:1rem;}
  .chart-wrap{position:relative;height:220px;}

  /* THREAT TABLE */
  .threat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
  .threat-card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1.5rem;}
  .threat-card h3{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.9rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .threat-badge{font-size:0.65rem;padding:2px 8px;border-radius:2px;font-family:'Share Tech Mono',monospace;}
  .badge-danger{background:rgba(255,59,92,0.15);color:var(--danger);border:1px solid rgba(255,59,92,0.3);}
  .badge-warn{background:rgba(255,184,0,0.15);color:var(--warn);border:1px solid rgba(255,184,0,0.3);}
  .badge-info{background:rgba(0,200,255,0.1);color:var(--accent);border:1px solid rgba(0,200,255,0.25);}
  .badge-ok{background:rgba(0,255,157,0.1);color:var(--accent2);border:1px solid rgba(0,255,157,0.25);}

  .mini-table{width:100%;border-collapse:collapse;font-size:0.82rem;}
  .mini-table th{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;padding:6px 8px;border-bottom:1px solid var(--border);text-align:left;}
  .mini-table td{padding:8px 8px;border-bottom:1px solid rgba(14,58,82,0.5);color:var(--text);vertical-align:middle;}
  .mini-table tr:last-child td{border-bottom:none;}
  .mini-table tr:hover td{background:rgba(0,200,255,0.03);}

  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}

  @media(max-width:768px){.charts-grid,.threat-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="scanline"></div>
<nav>
  <a class="nav-logo" href="../index.html"><div class="logo-dot"></div>Threat<span>Lens</span></a>
  <div class="nav-links">
    <a href="stats.html" class="active">Dashboard</a>
    <a href="events.html">Events</a>
    <a href="alerts.html">Alerts</a>
    <a href="sessions.html">Sessions</a>
  </div>
  <div class="nav-right">
    <div class="nav-org" id="nav-org">—</div>
    <button class="nav-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>// SECURITY DASHBOARD</h1>
    <p id="page-sub">Loading organization data...</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><span class="kpi-val" id="k-events">—</span><div class="kpi-label">Total Events</div></div>
    <div class="kpi danger"><span class="kpi-val" id="k-alerts">—</span><div class="kpi-label">Active Alerts</div></div>
    <div class="kpi warn"><span class="kpi-val" id="k-open">—</span><div class="kpi-label">Open Alerts</div></div>
    <div class="kpi green"><span class="kpi-val" id="k-sessions">—</span><div class="kpi-label">Active Sessions</div></div>
    <div class="kpi danger"><span class="kpi-val" id="k-flagged">—</span><div class="kpi-label">Flagged Sessions</div></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Events Per Day</h3>
      <div class="chart-wrap"><canvas id="chart-events"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>Alert Severity</h3>
      <div class="chart-wrap"><canvas id="chart-severity"></canvas></div>
    </div>
  </div>

  <div class="threat-grid">
    <div class="threat-card">
      <h3>Alert Types <span class="threat-badge badge-danger">THREATS</span></h3>
      <canvas id="chart-types" height="180"></canvas>
    </div>
    <div class="threat-card">
      <h3>Recent Alerts <span class="threat-badge badge-warn">LIVE</span></h3>
      <table class="mini-table">
        <thead><tr><th>Type</th><th>Severity</th><th>User</th><th>Status</th></tr></thead>
        <tbody id="recent-alerts"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
const orgId   = localStorage.getItem('org_id')   || '';
const orgName = localStorage.getItem('org_name') || 'All Orgs';
const role    = localStorage.getItem('role')     || 'Viewer';

document.getElementById('nav-org').textContent = orgName;
document.getElementById('page-sub').textContent =
  `Organization: ${orgName} | Role: ${role} | Live threat intelligence overview`;

function logout(){ localStorage.clear(); window.location.href='../index.html'; }

const SEV_COLOR = { Critical:'#ff3b5c', High:'#ffb800', Medium:'#00c8ff', Low:'#00ff9d' };

function badge(sev){
  const map={Critical:'badge-danger',High:'badge-warn',Medium:'badge-info',Low:'badge-ok'};
  return `<span class="threat-badge ${map[sev]||'badge-info'}">${sev}</span>`;
}
function statusBadge(s){
  const map={Open:'badge-danger',Investigating:'badge-warn',Resolved:'badge-ok'};
  return `<span class="threat-badge ${map[s]||'badge-info'}">${s}</span>`;
}

async function load(){
  const q = orgId ? `?org_id=${orgId}` : '';
  const [events, alerts, sessions, flagged, stats] = await Promise.all([
    fetch(`${API}/events/${q}`).then(r=>r.json()),
    fetch(`${API}/events/alerts${q}`).then(r=>r.json()),
    fetch(`${API}/sessions/${q}`).then(r=>r.json()),
    fetch(`${API}/sessions/flagged${q}`).then(r=>r.json()),
    fetch(`${API}/events/stats${q}`).then(r=>r.json()),
  ]);

  document.getElementById('k-events').textContent   = events.length;
  document.getElementById('k-alerts').textContent   = alerts.length;
  document.getElementById('k-open').textContent     = alerts.filter(a=>a.sta_tus==='Open').length;
  document.getElementById('k-sessions').textContent = sessions.filter(s=>s.sta_tus==='Active').length;
  document.getElementById('k-flagged').textContent  = flagged.length;

  // Events per day chart
  const epd = stats.events_per_day || [];
  new Chart(document.getElementById('chart-events'), {
    type:'line',
    data:{
      labels: epd.map(r=>r.day),
      datasets:[{
        label:'Events',data:epd.map(r=>r.count),
        borderColor:'#00c8ff',backgroundColor:'rgba(0,200,255,0.08)',
        tension:0.4,fill:true,pointBackgroundColor:'#00c8ff',pointRadius:4
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#4a7a94',font:{size:10}},grid:{color:'rgba(14,58,82,0.5)'}},
        y:{ticks:{color:'#4a7a94',font:{size:10}},grid:{color:'rgba(14,58,82,0.5)'}}
      }
    }
  });

  // Severity doughnut
  const svb = stats.severity_breakdown || [];
  new Chart(document.getElementById('chart-severity'),{
    type:'doughnut',
    data:{
      labels:svb.map(r=>r.severity),
      datasets:[{data:svb.map(r=>r.count),backgroundColor:svb.map(r=>SEV_COLOR[r.severity]||'#4a7a94'),borderWidth:0}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#c8dde8',font:{size:11}},position:'bottom'}}
    }
  });

  // Alert types bar
  const at = stats.alert_types || [];
  new Chart(document.getElementById('chart-types'),{
    type:'bar',
    data:{
      labels:at.map(r=>r.alert_type.replace('_',' ').toUpperCase()),
      datasets:[{data:at.map(r=>r.count),backgroundColor:'rgba(0,200,255,0.2)',borderColor:'#00c8ff',borderWidth:1}]
    },
    options:{responsive:true,indexAxis:'y',
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:'#4a7a94',font:{size:10}},grid:{color:'rgba(14,58,82,0.5)'}},
        y:{ticks:{color:'#c8dde8',font:{size:10}},grid:{display:false}}
      }
    }
  });

  // Recent alerts table
  const tbody = document.getElementById('recent-alerts');
  alerts.slice(0,6).forEach(a=>{
    tbody.innerHTML += `<tr>
      <td style="font-family:'Share Tech Mono',monospace;font-size:0.75rem">${a.alert_type.replace('_',' ')}</td>
      <td>${badge(a.severity)}</td>
      <td>${a.username||'—'}</td>
      <td>${statusBadge(a.sta_tus)}</td>
    </tr>`;
  });
}

load();
</script>
</body>
</html>
