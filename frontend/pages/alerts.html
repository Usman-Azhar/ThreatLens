<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThreatLens — Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#040d14;--bg2:#071520;--panel:#0a1e2e;--border:#0e3a52;--accent:#00c8ff;--accent2:#00ff9d;--danger:#ff3b5c;--warn:#ffb800;--text:#c8dde8;--text-dim:#4a7a94;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,13,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo span{color:var(--accent2);}
  .logo-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,157,0.4);}50%{box-shadow:0 0 0 6px rgba(0,255,157,0);}}
  .nav-links{display:flex;gap:0.5rem;}
  .nav-links a{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:var(--text-dim);padding:6px 14px;border:1px solid transparent;border-radius:3px;transition:all 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--border);background:rgba(0,200,255,0.06);}
  .nav-right{display:flex;align-items:center;gap:1rem;}
  .nav-org{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--accent2);background:rgba(0,255,157,0.08);padding:4px 12px;border:1px solid rgba(0,255,157,0.2);border-radius:3px;}
  .nav-logout{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--danger);cursor:pointer;border:1px solid rgba(255,59,92,0.3);padding:4px 10px;border-radius:3px;background:none;transition:all 0.2s;}
  .nav-logout:hover{background:rgba(255,59,92,0.1);}

  .page{position:relative;z-index:1;padding:80px 2rem 2rem;}
  .page-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
  .page-header h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.8rem;color:#fff;letter-spacing:2px;}
  .page-header p{color:var(--text-dim);font-size:0.85rem;font-family:'Share Tech Mono',monospace;margin-top:4px;}

  /* KPI strip */
  .kpi-strip{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:1rem 1.5rem;position:relative;overflow:hidden;min-width:130px;}
  .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);}
  .kpi.danger::after{background:var(--danger);}
  .kpi.warn::after{background:var(--warn);}
  .kpi.green::after{background:var(--accent2);}
  .kpi-val{font-family:'Share Tech Mono',monospace;font-size:1.8rem;color:var(--accent);display:block;}
  .kpi.danger .kpi-val{color:var(--danger);}
  .kpi.warn .kpi-val{color:var(--warn);}
  .kpi.green .kpi-val{color:var(--accent2);}
  .kpi-label{font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;}

  /* FILTERS */
  .filters{display:flex;gap:0.75rem;margin-bottom:1.2rem;flex-wrap:wrap;align-items:center;}
  .filter-select{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:3px;font-family:'Exo 2',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
  .filter-select:focus{border-color:var(--accent);}
  .filter-select option{background:var(--bg2);}
  .filter-label{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-dim);letter-spacing:1px;}
  .count-badge{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text-dim);margin-left:auto;}

  /* TABLE */
  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  thead{background:var(--bg2);}
  th{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
  td{padding:10px 14px;border-bottom:1px solid rgba(14,58,82,0.4);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(0,200,255,0.03);}

  .badge{font-size:0.68rem;padding:3px 10px;border-radius:2px;font-family:'Share Tech Mono',monospace;white-space:nowrap;}
  .sev-Critical{background:rgba(255,59,92,0.15);color:var(--danger);border:1px solid rgba(255,59,92,0.3);}
  .sev-High{background:rgba(255,184,0,0.15);color:var(--warn);border:1px solid rgba(255,184,0,0.3);}
  .sev-Medium{background:rgba(0,200,255,0.1);color:var(--accent);border:1px solid rgba(0,200,255,0.25);}
  .sev-Low{background:rgba(0,255,157,0.1);color:var(--accent2);border:1px solid rgba(0,255,157,0.25);}
  .sta-Open{background:rgba(255,59,92,0.12);color:var(--danger);border:1px solid rgba(255,59,92,0.25);}
  .sta-Investigating{background:rgba(255,184,0,0.12);color:var(--warn);border:1px solid rgba(255,184,0,0.25);}
  .sta-Resolved{background:rgba(0,255,157,0.1);color:var(--accent2);border:1px solid rgba(0,255,157,0.25);}

  .alert-type{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text);}
  .ip-cell{font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--accent);}
  .ts-cell{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--text-dim);}

  /* Status update dropdown */
  .status-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:0.7rem;outline:none;cursor:pointer;}
  .status-select:focus{border-color:var(--accent);}
  .status-select option{background:var(--bg2);}
  .btn-update{background:transparent;border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:0.65rem;padding:4px 10px;border-radius:3px;cursor:pointer;transition:all 0.2s;margin-left:4px;}
  .btn-update:hover{background:rgba(0,255,157,0.1);}

  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--panel);border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:0.8rem;padding:10px 20px;border-radius:4px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;}
  .toast.show{opacity:1;transform:none;}
  .empty-row td{text-align:center;padding:2rem;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.8rem;}
  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="toast" id="toast"></div>

<nav>
  <a class="nav-logo" href="../index.html"><div class="logo-dot"></div>Threat<span>Lens</span></a>
  <div class="nav-links">
    <a href="stats.html">Dashboard</a>
    <a href="events.html">Events</a>
    <a href="alerts.html" class="active">Alerts</a>
    <a href="sessions.html">Sessions</a>
  </div>
  <div class="nav-right">
    <div class="nav-org" id="nav-org">—</div>
    <button class="nav-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1>// ALERT MANAGEMENT</h1>
    <p>Threat alerts — update status, investigate, resolve</p>
  </div>

  <div class="kpi-strip">
    <div class="kpi danger"><span class="kpi-val" id="k-total">—</span><div class="kpi-label">Total Alerts</div></div>
    <div class="kpi danger"><span class="kpi-val" id="k-open">—</span><div class="kpi-label">Open</div></div>
    <div class="kpi warn"><span class="kpi-val" id="k-invest">—</span><div class="kpi-label">Investigating</div></div>
    <div class="kpi green"><span class="kpi-val" id="k-resolved">—</span><div class="kpi-label">Resolved</div></div>
    <div class="kpi danger"><span class="kpi-val" id="k-critical">—</span><div class="kpi-label">Critical</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">SEVERITY:</span>
    <select class="filter-select" id="f-sev">
      <option value="">All</option>
      <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
    </select>
    <span class="filter-label">STATUS:</span>
    <select class="filter-select" id="f-status">
      <option value="">All</option>
      <option>Open</option><option>Investigating</option><option>Resolved</option>
    </select>
    <span class="filter-label">TYPE:</span>
    <select class="filter-select" id="f-type">
      <option value="">All</option>
      <option value="brute_force">Brute Force</option>
      <option value="suspicious_ip">Suspicious IP</option>
      <option value="off_hours_login">Off Hours</option>
      <option value="privilege_escalation">Privilege Escalation</option>
    </select>
    <button class="btn-update" style="border-color:var(--text-dim);color:var(--text-dim);font-size:0.75rem;padding:6px 14px" onclick="clearFilters()">CLEAR</button>
    <span class="count-badge" id="count-badge">— alerts</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Created</th><th>Alert Type</th><th>Severity</th>
          <th>User</th><th>IP Address</th><th>Event</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="alerts-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
const orgId   = localStorage.getItem('org_id')   || '';
const orgName = localStorage.getItem('org_name') || 'All Orgs';
const role    = localStorage.getItem('role')     || 'Viewer';
document.getElementById('nav-org').textContent = orgName;
function logout(){ localStorage.clear(); window.location.href='../index.html'; }

let allAlerts = [];

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function formatTs(ts){ return ts ? ts.replace('T',' ').substring(0,19) : '—'; }

function renderTable(data){
  document.getElementById('count-badge').textContent = `${data.length} alerts`;
  const tbody = document.getElementById('alerts-tbody');
  if(!data.length){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">// NO ALERTS FOUND</td></tr>`;
    return;
  }
  const canEdit = role !== 'Viewer';
  tbody.innerHTML = data.map(a=>`
    <tr>
      <td style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.72rem">${a.alert_id}</td>
      <td class="ts-cell">${formatTs(a.created_at)}</td>
      <td><span class="alert-type">${a.alert_type.replace(/_/g,' ')}</span></td>
      <td><span class="badge sev-${a.severity}">${a.severity}</span></td>
      <td>${a.username||'—'}</td>
      <td class="ip-cell">${a.ip_address||'—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text-dim)">${a.event_type||'—'}</td>
      <td><span class="badge sta-${a.sta_tus}" id="sta-${a.alert_id}">${a.sta_tus}</span></td>
      <td>
        ${canEdit ? `
          <select class="status-select" id="sel-${a.alert_id}">
            <option ${a.sta_tus==='Open'?'selected':''}>Open</option>
            <option ${a.sta_tus==='Investigating'?'selected':''}>Investigating</option>
            <option ${a.sta_tus==='Resolved'?'selected':''}>Resolved</option>
          </select>
          <button class="btn-update" onclick="updateAlert(${a.alert_id})">SAVE</button>
        ` : '<span style="color:var(--text-dim);font-size:0.72rem;font-family:\'Share Tech Mono\',monospace">READ ONLY</span>'}
      </td>
    </tr>
  `).join('');
}

async function updateAlert(alertId){
  const newStatus = document.getElementById(`sel-${alertId}`).value;
  await fetch(`${API}/events/alerts/${alertId}`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({sta_tus: newStatus})
  });
  // update badge in place
  const badge = document.getElementById(`sta-${alertId}`);
  badge.className = `badge sta-${newStatus}`;
  badge.textContent = newStatus;
  // update local data
  const a = allAlerts.find(x=>x.alert_id===alertId);
  if(a) a.sta_tus = newStatus;
  updateKPIs();
  showToast(`✓ Alert #${alertId} → ${newStatus}`);
}

function updateKPIs(){
  document.getElementById('k-total').textContent    = allAlerts.length;
  document.getElementById('k-open').textContent     = allAlerts.filter(a=>a.sta_tus==='Open').length;
  document.getElementById('k-invest').textContent   = allAlerts.filter(a=>a.sta_tus==='Investigating').length;
  document.getElementById('k-resolved').textContent = allAlerts.filter(a=>a.sta_tus==='Resolved').length;
  document.getElementById('k-critical').textContent = allAlerts.filter(a=>a.severity==='Critical').length;
}

function applyFilters(){
  const sev    = document.getElementById('f-sev').value;
  const status = document.getElementById('f-status').value;
  const type   = document.getElementById('f-type').value;
  let data = allAlerts;
  if(sev)    data = data.filter(a=>a.severity===sev);
  if(status) data = data.filter(a=>a.sta_tus===status);
  if(type)   data = data.filter(a=>a.alert_type===type);
  renderTable(data);
}

function clearFilters(){
  ['f-sev','f-status','f-type'].forEach(id=>document.getElementById(id).value='');
  renderTable(allAlerts);
}

// auto-apply filters on change
['f-sev','f-status','f-type'].forEach(id=>{
  document.getElementById(id).addEventListener('change', applyFilters);
});

async function load(){
  const q = orgId ? `?org_id=${orgId}` : '';
  allAlerts = await fetch(`${API}/events/alerts${q}`).then(r=>r.json());
  updateKPIs();
  renderTable(allAlerts);
}

load();
</script>
</body>
</html>
