<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThreatLens — Events</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#040d14;--bg2:#071520;--panel:#0a1e2e;--border:#0e3a52;--accent:#00c8ff;--accent2:#00ff9d;--danger:#ff3b5c;--warn:#ffb800;--text:#c8dde8;--text-dim:#4a7a94;--glow:0 0 18px rgba(0,200,255,0.35);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,13,20,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:60px;}
  .nav-logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.4rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px;text-decoration:none;}
  .nav-logo span{color:var(--accent2);}
  .logo-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,157,0.4);}50%{box-shadow:0 0 0 6px rgba(0,255,157,0);}}
  .nav-links{display:flex;gap:0.5rem;}
  .nav-links a{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:var(--text-dim);padding:6px 14px;border:1px solid transparent;border-radius:3px;transition:all 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--border);background:rgba(0,200,255,0.06);}
  .nav-right{display:flex;align-items:center;gap:1rem;}
  .nav-org{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--accent2);background:rgba(0,255,157,0.08);padding:4px 12px;border:1px solid rgba(0,255,157,0.2);border-radius:3px;}
  .nav-logout{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--danger);cursor:pointer;border:1px solid rgba(255,59,92,0.3);padding:4px 10px;border-radius:3px;background:none;transition:all 0.2s;}
  .nav-logout:hover{background:rgba(255,59,92,0.1);}

  .page{position:relative;z-index:1;padding:80px 2rem 2rem;}
  .page-header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;}
  .page-header h1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.8rem;color:#fff;letter-spacing:2px;}
  .page-header p{color:var(--text-dim);font-size:0.85rem;font-family:'Share Tech Mono',monospace;}

  /* FILTERS */
  .filters{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;}
  .filter-select,.filter-input{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:7px 12px;border-radius:3px;font-family:'Exo 2',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;
  }
  .filter-select:focus,.filter-input:focus{border-color:var(--accent);}
  .filter-select option{background:var(--bg2);}
  .filter-label{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-dim);letter-spacing:1px;}
  .btn-filter{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.8rem;letter-spacing:2px;padding:7px 16px;border-radius:3px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
  .btn-filter:hover{background:rgba(0,200,255,0.1);}
  .count-badge{font-family:'Share Tech Mono',monospace;font-size:0.75rem;color:var(--text-dim);margin-left:auto;}

  /* TABLE */
  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  thead{background:var(--bg2);}
  th{font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
  td{padding:10px 14px;border-bottom:1px solid rgba(14,58,82,0.4);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(0,200,255,0.03);}

  .event-type{font-family:'Share Tech Mono',monospace;font-size:0.75rem;}
  .et-login_success{color:var(--accent2);}
  .et-login_failed{color:var(--danger);}
  .et-page_access{color:var(--warn);}
  .et-file_download{color:var(--accent);}

  .success-yes{color:var(--accent2);font-family:'Share Tech Mono',monospace;font-size:0.75rem;}
  .success-no{color:var(--danger);font-family:'Share Tech Mono',monospace;font-size:0.75rem;}
  .ip-cell{font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--accent);}
  .ts-cell{font-family:'Share Tech Mono',monospace;font-size:0.72rem;color:var(--text-dim);}
  .meta-cell{color:var(--text-dim);font-size:0.8rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .empty-row td{text-align:center;padding:2rem;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.8rem;}
  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
</style>
</head>
<body>
<div class="scanline"></div>
<nav>
  <a class="nav-logo" href="../index.html"><div class="logo-dot"></div>Threat<span>Lens</span></a>
  <div class="nav-links">
    <a href="stats.html">Dashboard</a>
    <a href="events.html" class="active">Events</a>
    <a href="alerts.html">Alerts</a>
    <a href="sessions.html">Sessions</a>
  </div>
  <div class="nav-right">
    <div class="nav-org" id="nav-org">—</div>
    <button class="nav-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>// EVENT LOG</h1>
      <p>All security events — logins, access attempts, file activity</p>
    </div>
  </div>

  <div class="filters">
    <span class="filter-label">TYPE:</span>
    <select class="filter-select" id="f-type">
      <option value="">All Types</option>
      <option value="login_success">login_success</option>
      <option value="login_failed">login_failed</option>
      <option value="page_access">page_access</option>
      <option value="file_download">file_download</option>
    </select>
    <span class="filter-label">SUCCESS:</span>
    <select class="filter-select" id="f-success">
      <option value="">All</option>
      <option value="true">Success</option>
      <option value="false">Failed</option>
    </select>
    <input class="filter-input" id="f-user" placeholder="Filter by username..." style="width:200px"/>
    <button class="btn-filter" onclick="applyFilters()">Apply</button>
    <button class="btn-filter" style="border-color:var(--text-dim);color:var(--text-dim)" onclick="clearFilters()">Clear</button>
    <span class="count-badge" id="count-badge">— events</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Timestamp</th><th>User</th><th>Asset</th>
          <th>Event Type</th><th>IP Address</th><th>Success</th><th>Metadata</th>
        </tr>
      </thead>
      <tbody id="events-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
const orgId   = localStorage.getItem('org_id')   || '';
const orgName = localStorage.getItem('org_name') || 'All Orgs';
document.getElementById('nav-org').textContent = orgName;
function logout(){ localStorage.clear(); window.location.href='../index.html'; }

let allEvents = [];

function formatTs(ts){ return ts ? ts.replace('T',' ').substring(0,19) : '—'; }

function renderTable(data){
  const tbody = document.getElementById('events-tbody');
  document.getElementById('count-badge').textContent = `${data.length} events`;
  if(!data.length){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">// NO EVENTS FOUND</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(e=>`
    <tr>
      <td style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:0.72rem">${e.event_id}</td>
      <td class="ts-cell">${formatTs(e.times_tamp)}</td>
      <td>${e.username||'—'}</td>
      <td style="color:var(--text);font-size:0.82rem">${e.asset_name||'—'}</td>
      <td><span class="event-type et-${e.event_type}">${e.event_type}</span></td>
      <td class="ip-cell">${e.ip_address||'—'}</td>
      <td>${e.success ? '<span class="success-yes">✓ YES</span>' : '<span class="success-no">✗ NO</span>'}</td>
      <td class="meta-cell" title="${e.metadata||''}">${e.metadata||'—'}</td>
    </tr>
  `).join('');
}

function applyFilters(){
  const type    = document.getElementById('f-type').value;
  const success = document.getElementById('f-success').value;
  const user    = document.getElementById('f-user').value.toLowerCase();
  let data = allEvents;
  if(type)    data = data.filter(e=>e.event_type===type);
  if(success) data = data.filter(e=>String(e.success)===(success==='true'?'true':'false'));
  if(user)    data = data.filter(e=>(e.username||'').toLowerCase().includes(user));
  renderTable(data);
}

function clearFilters(){
  document.getElementById('f-type').value='';
  document.getElementById('f-success').value='';
  document.getElementById('f-user').value='';
  renderTable(allEvents);
}

async function load(){
  const q = orgId ? `?org_id=${orgId}` : '';
  allEvents = await fetch(`${API}/events/${q}`).then(r=>r.json());
  renderTable(allEvents);
}

load();
</script>
</body>
</html>
