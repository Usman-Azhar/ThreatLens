<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThreatLens — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
    :root {
    --bg:       #161616;
    --bg2:      #0f0f0f;
    --panel:    #1e1e1e;
    --border:   #2a2a2a;
    --accent:   #6a9e7f;
    --accent2:  #4d7a61;
    --danger:   #c0392b;
    --warn:     #b07d2a;
    --text:     #e0e0e0;
    --text-dim: #5a5a5a;
    --glow:     0 0 12px rgba(106,158,127,0.2);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }
  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:999;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(12,12,12,0.96);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    padding:0 2rem;height:60px;gap:2rem;}
  .nav-logo{font-family:'Exo 2',sans-serif;font-weight:600;font-size:1.2rem;color:var(--text);letter-spacing:0.5px;display:flex;align-items:center;gap:10px;}
  .nav-logo span{color:var(--accent);}
  .logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(106,158,127,0.3);}50%{box-shadow:0 0 0 5px rgba(106,158,127,0);}}50%{box-shadow:0 0 0 6px rgba(0,255,157,0);}}
  .nav-links{display:flex;gap:0.5rem;align-items:center;}
  .nav-links a{font-family:'Exo 2',sans-serif;font-weight:400;font-size:0.8rem;
    letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;
    color:var(--text-dim);padding:6px 14px;border:1px solid transparent;border-radius:3px;transition:all 0.2s;}
  .nav-links a:hover,.nav-links a.active{color:var(--accent);border-color:var(--border);
    background:rgba(106,158,127,0.08);}
  .nav-logout{position:absolute;right:2rem;}
  .nav-logout form button{
    font-family:'Exo 2',sans-serif;font-weight:400;font-size:0.8rem;letter-spacing:0.5px;text-transform:uppercase;background:transparent;
    border:1px solid var(--danger);color:var(--danger);
    padding:6px 14px;border-radius:3px;cursor:pointer;transition:all 0.2s;}
  .nav-logout form button:hover{background:rgba(255,59,92,0.1);}

  /* MAIN LAYOUT */
  .main{position:relative;z-index:1;padding:80px 2rem 2rem;max-width:1300px;margin:0 auto;}
  .page-header{display:flex;align-items:center;justify-content:space-between;
    margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
  .page-title{font-family:'Exo 2',sans-serif;font-weight:700;font-size:1.6rem;
    letter-spacing:3px;text-transform:uppercase;color:var(--accent);}
  .page-title span{color:var(--text-dim);font-size:0.8rem;font-family:'Share Tech Mono',monospace;
    display:block;letter-spacing:1px;margin-top:2px;}
  .refresh-badge{font-family:'Share Tech Mono',monospace;font-size:0.7rem;
    color:var(--accent2);border:1px solid rgba(0,255,157,0.3);
    padding:4px 12px;border-radius:2px;}

  /* TABLE */
  .table-wrap{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--bg2);font-family:'Exo 2',sans-serif;font-weight:700;
    font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);
    padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);}
  tbody tr{border-bottom:1px solid rgba(14,58,82,0.5);transition:background 0.15s;}
  tbody tr:hover{background:rgba(0,200,255,0.04);}
  tbody td{padding:11px 16px;font-size:0.9rem;font-family:'Exo 2',sans-serif;color:var(--text);}
  .mono{font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--text-dim);}

  /* BADGES */
  .badge{display:inline-block;padding:2px 10px;border-radius:2px;font-family:'Exo 2',sans-serif;font-weight:700;font-size:0.75rem;
    letter-spacing:1px;text-transform:uppercase;}
  .badge-critical{background:rgba(255,59,92,0.15);color:var(--danger);border:1px solid rgba(255,59,92,0.3);}
  .badge-high{background:rgba(255,184,0,0.12);color:var(--warn);border:1px solid rgba(255,184,0,0.3);}
  .badge-medium{background:rgba(0,200,255,0.1);color:var(--accent);border:1px solid rgba(0,200,255,0.3);}
  .badge-low{background:rgba(0,255,157,0.08);color:var(--accent2);border:1px solid rgba(0,255,157,0.2);}
  .badge-open{background:rgba(255,59,92,0.12);color:var(--danger);border:1px solid rgba(255,59,92,0.25);}
  .badge-investigating{background:rgba(255,184,0,0.1);color:var(--warn);border:1px solid rgba(255,184,0,0.25);}
  .badge-resolved{background:rgba(0,255,157,0.08);color:var(--accent2);border:1px solid rgba(0,255,157,0.2);}
  .badge-active{background:rgba(0,255,157,0.08);color:var(--accent2);border:1px solid rgba(0,255,157,0.2);}
  .badge-expired{background:rgba(74,122,148,0.1);color:var(--text-dim);border:1px solid rgba(74,122,148,0.2);}
  .badge-suspicious{background:rgba(255,59,92,0.15);color:var(--danger);border:1px solid rgba(255,59,92,0.3);}
  .badge-flagged{background:rgba(255,59,92,0.15);color:var(--danger);border:1px solid rgba(255,59,92,0.3);
    animation:pulse 2s infinite;}
  .badge-success{background:rgba(0,255,157,0.08);color:var(--accent2);border:1px solid rgba(0,255,157,0.2);}
  .badge-fail{background:rgba(255,59,92,0.12);color:var(--danger);border:1px solid rgba(255,59,92,0.25);}

  /* STATUS SELECT */
  .status-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);
    padding:4px 8px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:0.75rem;
    cursor:pointer;outline:none;}
  .status-select:focus{border-color:var(--accent);}

  /* KPI STRIP */
  .kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:4px;
    padding:1.1rem 1.4rem;position:relative;overflow:hidden;}
  .kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .kpi.kpi-blue::after{background:var(--accent);}
  .kpi.kpi-green::after{background:var(--accent2);}
  .kpi.kpi-red::after{background:var(--danger);}
  .kpi.kpi-warn::after{background:var(--warn);}
  .kpi .kpi-val{font-family:'Share Tech Mono',monospace;font-size:1.8rem;color:var(--accent);}
  .kpi.kpi-green .kpi-val{color:var(--accent2);}
  .kpi.kpi-red .kpi-val{color:var(--danger);}
  .kpi.kpi-warn .kpi-val{color:var(--warn);}
  .kpi .kpi-lbl{font-family:'Exo 2',sans-serif;font-size:0.75rem;
    letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:2px;}

  /* EMPTY STATE */
  .empty{text-align:center;padding:3rem;color:var(--text-dim);
    font-family:'Share Tech Mono',monospace;font-size:0.85rem;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  .main{animation:fadeUp 0.4s ease both;}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">
    <div class="logo-dot"></div>
    Threat<span>Lens</span>
  </div>
  <div class="nav-links">
    {% if role_id == 1 %}
    <a href="/sessions">Sessions</a>
    {% endif %}
    <a href="/events">Events</a>
    <a href="/alerts">Alerts</a>
    <a href="/stats" class="active">Stats</a>
  </div>
  <div class="nav-logout">
    <form action="/auth/logout" method="POST">
      <button type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div class="page-title">
      // Dashboard Stats
      <span>Events per day · Severity breakdown · Alert types</span>
    </div>
    <div class="refresh-badge">AUTO-REFRESH 30s</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem;">

    <!-- Events per day -->
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:1.5rem;">
      <div style="font-family:'Rajdhani',sans-serif;font-size:0.85rem;letter-spacing:2px;
        text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;">
        Events per Day
      </div>
      <canvas id="chartDays" height="200"></canvas>
    </div>

    <!-- Severity breakdown -->
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:1.5rem;">
      <div style="font-family:'Rajdhani',sans-serif;font-size:0.85rem;letter-spacing:2px;
        text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;">
        Alert Severity Breakdown
      </div>
      <canvas id="chartSeverity" height="200"></canvas>
    </div>

  </div>

  <!-- Alert types -->
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:1.5rem;">
    <div style="font-family:'Rajdhani',sans-serif;font-size:0.85rem;letter-spacing:2px;
      text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;">
      Alert Type Breakdown
    </div>
    <canvas id="chartTypes" height="120"></canvas>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script id="stats-data" type="application/json">
  {
    "eventsPerDay": {{ events_per_day | tojson }},
    "severityData": {{ severity_breakdown | tojson }},
    "alertTypesData": {{ alert_types | tojson }}
  }
</script>
<script>
  // Data injected by Flask
  const statsData = JSON.parse(document.getElementById('stats-data').textContent);
  const eventsPerDay   = statsData.eventsPerDay;
  const severityData   = statsData.severityData;
  const alertTypesData = statsData.alertTypesData; // FIX: was statsData.alertTypes (wrong key)

  const gridColor = "rgba(42,42,42,0.8)";
  const tickColor = "#5a5a5a";
  const baseOptions = {
    plugins: { legend: { labels: { color: "#e0e0e0", font: { family: "Share Tech Mono", size: 11 } } } },
    scales: {
      x: { ticks: { color: tickColor, font: { family: "Share Tech Mono", size: 10 } }, grid: { color: gridColor } },
      y: { ticks: { color: tickColor, font: { family: "Share Tech Mono", size: 10 } }, grid: { color: gridColor } }
    }
  };

  // Chart 1 — events per day (line)
  new Chart(document.getElementById("chartDays"), {
    type: "line",
    data: {
      labels: eventsPerDay.map(r => r.day),
      datasets: [{ label: "Events", data: eventsPerDay.map(r => r.count),
        borderColor: "#6a9e7f", backgroundColor: "rgba(106,158,127,0.1)",
        pointBackgroundColor: "#6a9e7f", tension: 0.3, fill: true }]
    },
    options: baseOptions
  });

  // Chart 2 — severity (doughnut)
  const sevColors = { Critical:"#c0392b", High:"#b07d2a", Medium:"#6a9e7f", Low:"#4d7a61" };
  new Chart(document.getElementById("chartSeverity"), {
    type: "doughnut",
    data: {
      labels: severityData.map(r => r.severity),
      datasets: [{ data: severityData.map(r => r.count),
        backgroundColor: severityData.map(r => sevColors[r.severity] || "#4a7a94"),
        borderColor: "#161616", borderWidth: 2 }]
    },
    options: { plugins: { legend: { labels: { color:"#e0e0e0", font:{ family:"Share Tech Mono", size:11 } } } } }
  });

  // Chart 3 — alert types (bar)
  new Chart(document.getElementById("chartTypes"), {
    type: "bar",
    data: {
      labels: alertTypesData.map(r => r.alert_type),
      datasets: [{ label: "Count", data: alertTypesData.map(r => r.count),
        backgroundColor: "rgba(0,200,255,0.2)", borderColor: "#6a9e7f",
        borderWidth: 1 }]
    },
    options: baseOptions
  });

  // Auto-refresh every 30 seconds
  setTimeout(function () { location.reload(); }, 30000);
</script>
</body>
</html>
