<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ org_name }} — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#040d14;
    color:#c8dde8;
    font-family:'Exo 2',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card{
    text-align:center;
    padding:3rem 4rem;
    border:1px solid #0e3a52;
    border-radius:8px;
    background:#0a1e2e;
    max-width:480px;
    width:100%;
  }
  .org{
    font-family:'Rajdhani',sans-serif;
    font-size:1.8rem;
    font-weight:700;
    color:#00c8ff;
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:0.5rem;
  }
  .greeting{
    font-size:1rem;
    color:#4a7a94;
    margin-bottom:2rem;
  }
  .greeting span{
    color:#c8dde8;
    font-weight:600;
  }
  .status{
    font-size:0.85rem;
    color:#00ff9d;
    margin-bottom:2rem;
    letter-spacing:1px;
  }
  .spinner{
    width:32px;
    height:32px;
    border:3px solid #0e3a52;
    border-top:3px solid #00c8ff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:0 auto 1.5rem;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .redirect-msg{
    font-size:0.78rem;
    color:#4a7a94;
    letter-spacing:1px;
  }
  .logout-link{
    display:inline-block;
    margin-top:2rem;
    font-size:0.78rem;
    color:#4a7a94;
    text-decoration:none;
    border-bottom:1px solid #0e3a52;
    padding-bottom:2px;
    cursor:pointer;
    background:none;
    border-top:none;
    border-left:none;
    border-right:none;
    font-family:'Exo 2',sans-serif;
  }
  .logout-link:hover{color:#ff3b5c;}
</style>
</head>
<body>
  <div class="card">
    <div class="org">{{ org_name }}</div>
    <div class="greeting">Welcome, <span>{{ username }}</span></div>
    <div class="status">● LOGIN VERIFIED</div>
    <div class="spinner"></div>
    <div class="redirect-msg">Redirecting to your organization system...</div>
    <form action="/auth/logout" method="POST">
      <button class="logout-link" type="submit">Not you? Logout</button>
    </form>
  </div>
</body>
</html>
